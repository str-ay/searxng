services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "18088:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:18088/
      - INSTANCE_NAME=Claude Search
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-this-to-a-random-secret-key-please}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - searxng-network

  mcp-searxng:
    build:
      context: .
      dockerfile: Dockerfile.mcp-searxng
    container_name: mcp-searxng
    restart: on-failure
    ports:
      - "13000:3000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - MCP_HTTP_PORT=3000
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      - searxng
    networks:
      - searxng-network

networks:
  searxng-network:
    driver: bridge